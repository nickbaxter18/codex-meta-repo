services:
  devcontainer:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspaces/codex-meta-repo:cached
      - /var/run/docker.sock:/var/run/docker.sock
      - devcontainer-node-modules:/workspaces/codex-meta-repo/node_modules
      - devcontainer-frontend-node-modules:/workspaces/codex-meta-repo/U-DIG-IT/frontend/node_modules
    environment:
      - NODE_ENV=development
      - PYTHONPATH=/workspaces/codex-meta-repo
      - POETRY_VIRTUALENVS_IN_PROJECT=true
    working_dir: /workspaces/codex-meta-repo
    command: sleep infinity
    networks:
      - codex-network

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: u_dig_it
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../U-DIG-IT/scripts/init-pgvector.sql:/docker-entrypoint-initdb.d/01-init-pgvector.sql
    networks:
      - codex-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d u_dig_it"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    networks:
      - codex-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgvector:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: u_dig_it
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - codex-network
    command: ["postgres", "-c", "shared_preload_libraries=vector"]

volumes:
  devcontainer-node-modules:
  devcontainer-frontend-node-modules:
  postgres-data:

networks:
  codex-network:
    driver: bridge
